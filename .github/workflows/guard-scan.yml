name: Guard Scan

on:
  pull_request:
    paths:
      - ".prompts/**"

jobs:
  scan:
    name: Scan prompt files
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

